name: Build iOS

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/ios-build.yml'
      - 'example/ios/**'
      - 'example/Gemfile'
      - 'example/Gemfile.lock'
      - 'example-expo/**'
      - 'plugin/**'
      - 'app.plugin.js'
      - '**/nitrogen/generated/shared/**'
      - '**/nitrogen/generated/ios/**'
      - 'cpp/**'
      - 'ios/**'
      - '**/Podfile.lock'
      - '**/bun.lock'
      - '**/*.podspec'
      - '**/react-native.config.js'
      - '**/nitro.json'
  pull_request:
    paths:
      - '.github/workflows/ios-build.yml'
      - 'example/ios/**'
      - 'example/Gemfile'
      - 'example/Gemfile.lock'
      - 'example-expo/**'
      - 'plugin/**'
      - 'app.plugin.js'
      - '**/nitrogen/generated/shared/**'
      - '**/nitrogen/generated/ios/**'
      - 'cpp/**'
      - 'ios/**'
      - '**/Podfile.lock'
      - '**/bun.lock'
      - '**/*.podspec'
      - '**/react-native.config.js'
      - '**/nitro.json'
  workflow_dispatch:

env:
  USE_CCACHE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS (${{ matrix.label }})
    runs-on: macOS-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: bare
            ios-dir: example/ios
            workspace: NitroGoogleSigninExample.xcworkspace
            scheme: NitroGoogleSigninExample
            use-bundler: true
            cache-path: example/ios/Pods
            cache-key: bare-${{ hashFiles('example/ios/Podfile.lock', 'NitroGoogleSignin.podspec') }}
          - label: expo
            ios-dir: example-expo/ios
            workspace: NitroGoogleSignInExpo.xcworkspace
            scheme: NitroGoogleSignInExpo
            use-bundler: false
            cache-path: example-expo/ios/Pods
            cache-key: expo-${{ hashFiles('example-expo/package.json', 'plugin/withNitroGoogleSignIn.js', 'NitroGoogleSignin.podspec') }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: oven-sh/setup-bun@v2
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 16.4

      - name: Install dependencies (bun)
        run: bun install

      - name: Setup Ruby (bundle)
        if: matrix.use-bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: example/ios

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods/repos
            ${{ matrix.cache-path }}
          key: ${{ runner.os }}-pods-${{ matrix.cache-key }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Pods (bare)
        if: matrix.label == 'bare'
        working-directory: example/ios
        run: pod install

      - name: Prebuild iOS (expo)
        if: matrix.label == 'expo'
        working-directory: example-expo
        run: bunx expo prebuild --platform ios

      - name: Build App
        working-directory: ${{ matrix.ios-dir }}
        run: |
          set -o pipefail && xcodebuild \
            CC=clang CPLUSPLUS=clang++ LD=clang LDPLUSPLUS=clang++ \
            -derivedDataPath build -UseModernBuildSystem=YES \
            -workspace ${{ matrix.workspace }} \
            -scheme ${{ matrix.scheme }} \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build \
            CODE_SIGNING_ALLOWED=NO | xcpretty
