name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'assets/google-signin-android.webm'
      - 'assets/google-signin-iOS.mov'
      - 'AGENTS.md'
      - 'skills/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docusaurus site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Sync demo videos from package assets
        run: node docs/scripts/sync-media.mjs

      - name: Build site
        working-directory: docs
        env:
          DOCUSAURUS_BASE_URL: ${{ vars.DOCUSAURUS_BASE_URL || '/google-signin/' }}
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
