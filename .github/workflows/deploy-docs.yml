# Based on GitHub's "Deploy Jekyll with GitHub Pages" sample, adapted for Docusaurus.
# Prerequisite: Settings → Pages → Source: GitHub Actions
# https://github.com/react-native-nitro-google-signin/google-signin/settings/pages
name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'assets/google-signin-android.webm'
      - 'assets/google-signin-iOS.mov'
      - 'AGENTS.md'
      - 'skills/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Sync demo videos from package assets
        run: node docs/scripts/sync-media.mjs

      - name: Build site
        working-directory: docs
        env:
          # configure-pages sets base_path (e.g. /google-signin); Docusaurus expects a trailing slash
          DOCUSAURUS_BASE_URL: ${{ vars.DOCUSAURUS_BASE_URL || format('{0}/', steps.pages.outputs.base_path) }}
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
