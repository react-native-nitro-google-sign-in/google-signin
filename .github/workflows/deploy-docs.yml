name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'assets/**'
      - 'AGENTS.md'
      - 'skills/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Required for actions/deploy-pages (OIDC).
# If deploy fails with HttpError: Not Found, enable Pages in the repo:
# Settings → Pages → Build and deployment → Source: GitHub Actions
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docusaurus site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: docs
        env:
          # Project site: /google-signin/ — repo variable DOCUSAURUS_BASE_URL=/ for custom domain root
          DOCUSAURUS_BASE_URL: ${{ vars.DOCUSAURUS_BASE_URL || '/google-signin/' }}
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
