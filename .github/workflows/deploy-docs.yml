name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'assets/google-signin-android.webm'
      - 'assets/google-signin-iOS.mov'
      - 'AGENTS.md'
      - 'skills/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Prerequisite (repo admin, one-time): Settings → Pages → Build and deployment → Source: GitHub Actions
# https://github.com/react-native-nitro-google-signin/google-signin/settings/pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docusaurus site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Sync demo videos from package assets
        run: node docs/scripts/sync-media.mjs

      - name: Build site
        working-directory: docs
        env:
          DOCUSAURUS_BASE_URL: ${{ vars.DOCUSAURUS_BASE_URL || '/google-signin/' }}
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SITE="https://react-native-nitro-google-signin.github.io/google-signin/"
          if [ "$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.has_pages')" = "true" ]; then
            echo "::notice title=Documentation site::$SITE"
            exit 0
          fi
          echo "::warning title=Enable GitHub Pages::Source must be **GitHub Actions** at https://github.com/${GITHUB_REPOSITORY}/settings/pages — then re-run this workflow."
